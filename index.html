<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAPTUBE SPEED ARENA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050c0e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 50% 38%, rgba(255, 183, 24, .22), transparent 33%), linear-gradient(135deg, #071215 0%, #121e1b 52%, #070d10 100%); }
        canvas { position: relative; display: block; max-width: 100vw; max-height: 100vh; }
        #loading { position: fixed; z-index: 5; inset: 0; display: grid; place-items: center; padding: 24px; font-family: Arial, sans-serif; color: #fff; background: rgba(4, 10, 12, .72); transition: opacity .35s ease, visibility .35s ease; }
        #loading.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading-card { width: min(92vw, 460px); padding: 28px 30px 25px; border: 2px solid #ffd83b; background: linear-gradient(145deg, rgba(16, 33, 30, .98), rgba(4, 12, 15, .98)); box-shadow: 0 0 0 7px rgba(255, 196, 26, .14), 0 22px 70px rgba(0, 0, 0, .58); text-align: center; }
        .loading-brand { color: #77ffa0; font-size: 12px; font-weight: 800; letter-spacing: .32em; }
        .loading-title { margin-top: 13px; color: #ffe95a; font-size: clamp(22px, 5vw, 31px); font-weight: 900; letter-spacing: .045em; line-height: 1.05; }
        .loading-subtitle { margin-top: 11px; color: #d8eadc; font-size: 12px; font-weight: 700; letter-spacing: .12em; }
        .loading-track { height: 10px; margin-top: 24px; border: 1px solid rgba(255, 234, 104, .56); background: #071113; overflow: hidden; }
        .loading-fill { width: 8%; height: 100%; background: linear-gradient(90deg, #ffae12, #fff36e, #78ff9e); box-shadow: 0 0 20px rgba(255, 228, 62, .9); transition: width .22s ease; }
        .loading-status { min-height: 18px; margin-top: 13px; color: #ffe780; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <div id="loading" role="status" aria-live="polite">
        <div class="loading-card">
            <div class="loading-brand">SNAPTUBE</div>
            <div class="loading-title">SNAPTUBE SPEED ARENA</div>
            <div class="loading-subtitle">PREPARANDO A ARENA DE VELOCIDADE</div>
            <div class="loading-track"><div id="loading-fill" class="loading-fill"></div></div>
            <div id="loading-status" class="loading-status">CARREGANDO ARENA... 8%</div>
        </div>
    </div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <script>
        var ASFE_ASSET_VERSION = '83171a2e7748715e';
        var loading = document.getElementById('loading');
        var loadingFill = document.getElementById('loading-fill');
        var loadingStatus = document.getElementById('loading-status');
        function updateLoading(status) {
            var text = status || 'CARREGANDO ARENA...';
            var percent = 12;
            var progress = /\((\d+)\/(\d+)\)/.exec(text);
            if (progress && Number(progress[2]) > 0) {
                percent = Math.max(12, Math.min(96, Math.round(Number(progress[1]) * 100 / Number(progress[2]))));
            }
            if (loadingFill) loadingFill.style.width = percent + '%';
            if (loadingStatus) loadingStatus.textContent = text.toUpperCase() + ' ' + percent + '%';
        }
        var Module = {
            canvas: document.getElementById('canvas'),
            locateFile: function(path, prefix) {
                if (path === 'instagram_web_game_web_player.wasm' || path === 'instagram_web_game_web_player.data') {
                    return (prefix || '') + path + '?v=' + ASFE_ASSET_VERSION;
                }
                return (prefix || '') + path;
            },
            onRuntimeInitialized: function() {
                if (loadingFill) loadingFill.style.width = '100%';
                if (loadingStatus) loadingStatus.textContent = 'PRONTO!';
                window.setTimeout(function() { loading.classList.add('hidden'); }, 180);
                console.log('[AsfeWebPlayer] WASM runtime initialized');
            },
            setStatus: updateLoading,
            monitorRunDependencies: function(left) {
                updateLoading(left ? 'PREPARANDO RECURSOS (' + left + '/8)' : 'INICIANDO ARENA...');
            },
            print: function(text) { console.log('[ASFE]', text); },
            printErr: function(text) { console.error('[ASFE]', text); }
        };
    </script>
    <script src="instagram_web_game_web_player.js?v=83171a2e7748715e"></script>
</body>
</html>
