<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Web Mini Game - Asfe Web Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { display: block; max-width: 100vw; max-height: 100vh; }
        #loading { color: #aaa; font-family: monospace; font-size: 1.2em; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #loading.hidden { display: none; }
    </style>
</head>
<body>
    <div id="loading">Loading Instagram Web Mini Game...</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <script>
        var Module = {
            canvas: document.getElementById('canvas'),
            onRuntimeInitialized: function() {
                document.getElementById('loading').classList.add('hidden');
                console.log('[AsfeWebPlayer] WASM runtime initialized');
            },
            print: function(text) { console.log('[ASFE]', text); },
            printErr: function(text) { console.error('[ASFE]', text); }
        };
    </script>
    <script src="instagram_web_game_web_player.js"></script>
</body>
</html>
